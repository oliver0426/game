<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- ==================== 元資料與基本設定 ==================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>📋 考卷批改遊戲</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- ==================== 進度條 ==================== -->
    <div class="progress-bar" id="progressBar">
        第 <span id="currentNumber">-</span> 張 / 共 <span id="totalNumber">-</span> 張
    </div>

    <!-- ==================== 主遊戲容器 ==================== -->
    <div class="game-container">
        <!-- Canvas 容器：遊戲尚未開始時隱藏 -->
        <div class="canvas-wrapper" id="canvasWrapper" style="display: none;">
            <!-- HTML5 Canvas 元素：用於繪製考卷與紅筆痕跡 -->
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- 下一張按鈕：遊戲尚未開始時隱藏 -->
        <button class="next-button" id="nextButton" style="display: none;">
            ⏭️ 下一張
        </button>
    </div>

    <!-- ==================== 規則說明彈窗 ==================== -->
    <!-- 此彈窗在進入網站時自動顯示，用戶點擊「開始遊戲」後隱藏 -->
    <div class="modal-overlay" id="rulesModal">
        <div class="modal">
            <h2>📋 歡迎來到考卷批改遊戲！</h2>
            <div class="rules">
                <p><strong>【規則說明】：</strong></p>
                <p>1. 點擊開始後，考卷會從右側滑入畫面中央。</p>
                <p>2. 您的滑鼠就是紅筆，按住【滑鼠左鍵】並拖曳，即可在考卷上進行圈選、批改。</p>
                <p>3. 批改完成後，請點擊下方的「下一張」按鈕切換。</p>
                <p>4. 改完所有考卷後遊戲即結束。</p>
            </div>
            <button class="modal-button" id="startButton">開始遊戲</button>
        </div>
    </div>

    <!-- ==================== 遊戲結束彈窗 ==================== -->
    <!-- 當所有考卷批改完成後自動顯示此彈窗 -->
    <div class="game-over-modal" id="gameOverModal" style="display: none;">
        <div class="game-over-content">
            您已完成所有考卷的批改！
            <button class="modal-button" id="restartButton" style="margin-top: 30px;">重新開始</button>
        </div>
    </div>

    <!-- ==================== 右下角操作提示 ==================== -->
    <!-- 字體調淡、位置固定在右下角，不干擾遊戲體驗 -->
    <div class="tips">
        <div>左鍵：紅筆寫入</div>
        <div>下方按鈕：更換考卷</div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
